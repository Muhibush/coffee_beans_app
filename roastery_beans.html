    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    body { font-family: 'Inter', sans-serif; background-color: #fcf9f5; }

<body class="text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fcf9f5]/80 backdrop-blur-xl flex items-center justify-between px-4 h-16 w-full">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#f6f3ef] transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#553722]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-on-surface text-lg">Roastery Beans</h1>
</div>
</header>
<main class="pt-20 px-4 max-w-2xl mx-auto space-y-8 pb-8">
<!-- Scraper Section -->
<section class="space-y-4">
<h2 class="text-xl font-bold tracking-tight text-on-surface font-headline">Scraper</h2>
<div class="bg-surface-container-lowest p-4 rounded-2xl space-y-4">
<div class="flex flex-col sm:flex-row gap-3">
<div class="relative flex-grow">
<input class="w-full h-12 pr-4 bg-surface-container-low border-none rounded-xl text-sm focus:ring-2 focus:ring-primary px-4" placeholder="Paste store/product URL..." type="url"/>
</div>
<button class="h-12 px-8 bg-primary-container text-white font-semibold rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-sm">
            Scrape
          </button>
</div>
</div>
</section>
<!-- Search & Filter Section -->
<div class="space-y-8">
<!-- Search Section -->
<section>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant text-xl" data-icon="search">search</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-low border-none rounded-xl text-body-md focus:ring-2 focus:ring-primary transition-all placeholder:text-on-surface-variant/60" placeholder="Search beans..." type="text"/>
</div>
</section>
<!-- Filter Section -->
<section class="flex overflow-x-auto gap-2 hide-scrollbar -mx-4 px-4">
<button class="px-5 py-2 rounded-full bg-primary text-white text-sm font-medium whitespace-nowrap active:scale-95 duration-150">All</button>
<button class="px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium whitespace-nowrap active:scale-95 duration-150">Published</button>
<button class="px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium whitespace-nowrap active:scale-95 duration-150">Draft</button>
<button class="px-5 py-2 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium whitespace-nowrap active:scale-95 duration-150">Unpublished</button>
</section>
</div>
<!-- Inventory Section -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-xl font-bold tracking-tight text-on-surface font-headline">Inventory</h2>

</div>
<div class="flex-grow min-w-0">
<div class="flex items-center justify-between mb-1">
<h3 class="text-on-surface font-semibold text-base truncate">Ethiopia Guji</h3>
<span class="inline-block px-2 py-0.5 rounded-full bg-green-100 text-green-700 text-[10px] font-bold uppercase tracking-wider">published</span>
</div>
<div class="flex items-center">
<span class="text-primary font-bold">Rp 85.000</span>
</div>
</div>
</div>

<div class="w-20 h-20 rounded-xl overflow-hidden flex-shrink-0">
<img alt="Watermelon Smash" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" data-alt="Vibrant artistic shot of green unroasted coffee cherries and pink watermelon slices for a concept of experimental processing" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfHCkg8cqPPWFPG7HUimWv-E1DCY3sLsjKPo8TsL-tNqmu-wvODEXZZzk9RgOs0Jl2pQ-uogzDVLpSp9q_IexPEIUc-caorV3NH-USS81mg2Wv92HjUHKgZT0qGdnQdb7nCmCfttS2KqvsfLBfongBJDGZ5r5LCvgsKaU73FP7OP9Ri8skVrYUM_UfqI2vO0pkkOukUiI9Y_hb5SVVWiFkX3My1NmxLcS15qMSIk9qMUpS5CIBzSzLJCkexT1-mctgA3A2K9DeJXH2"/>

<div class="flex items-center justify-between mb-1">
<h3 class="text-on-surface font-semibold text-base truncate">Watermelon Smash</h3>
<span class="inline-block px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-[10px] font-bold uppercase tracking-wider">draft</span>
</div>
<div class="flex items-center">
<span class="text-primary font-bold">Rp 96.570</span>
</div>

</div>

</div>
<div class="flex-grow min-w-0">
<div class="flex items-center justify-between mb-1">
<h3 class="text-on-surface font-semibold text-base truncate">Aceh Gayo</h3>
<span class="inline-block px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 text-[10px] font-bold uppercase tracking-wider">unpublished</span>

<div class="flex items-center">
<span class="text-primary font-bold">Rp 120.000</span>

</div>
</div>
</div>
</section>

<!-- BottomNavBar -->
<button class="fixed bottom-8 right-6 w-14 h-14 bg-[#6F4E37] text-white rounded-full flex items-center justify-center shadow-lg hover:brightness-110 active:scale-95 transition-all z-[60]">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
</body></html>
